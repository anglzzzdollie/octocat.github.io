<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hello,18 💗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffeef7;
color:#d63384;
text-align:center;
padding:20px;
overflow-x:hidden;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#fff0f6;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:9999;
}

#loading img{
width:180px;
animation:float 3s infinite;
}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

100%{
transform:translateY(0);
}

}

.card{

background:white;

padding:25px;

border-radius:25px;

max-width:700px;

margin:25px auto;

box-shadow:
0 5px 20px rgba(0,0,0,.1);

}

input,
textarea{

width:100%;

padding:15px;

margin-top:10px;

border-radius:15px;

border:1px solid #ffcce0;

}

button{

margin-top:15px;

padding:12px 20px;

background:#ff69b4;

border:none;

border-radius:30px;

color:white;

cursor:pointer;

}

button:hover{

transform:scale(1.05);

}

#carousel-img{

width:300px;

height:420px;

object-fit:cover;

border-radius:20px;

}

.message{

background:#fff0f6;

padding:15px;

border-radius:15px;

margin-top:15px;

}

.invite-img{

width:300px;

border-radius:20px;

}

</style>

</head>

<body>

<div id="loading">

<img
id="loading-gif"
src="hellokitty.gif"
alt="gif"
>

<h2>
Carregando meu cantinho 💗
</h2>

</div>


<div class="card">

<h1>
Deixe seu carinho 💗
</h1>

<p>
Cada recadinho deixa meu dia especial
</p>

</div>



<div class="card">

<h2>
Deixe um recado
</h2>

<input
id="guestName"
placeholder="Seu nome"
>

<textarea
id="guestMessage"
placeholder="Escreva algo especial..."
></textarea>

<button onclick="sendMessage()">
Enviar
</button>

<div id="messagesContainer">

</div>

</div>



<div class="card">

<h2>
Meu Convite 💌
</h2>

<p>

Estou super animada para comemorar com vocês 🎉

</p>

<img
src="convite.jpg"
class="invite-img"
>

</div>



<div class="card">

<h2>
Linha do Tempo 💗
</h2>

<button onclick="fotoAnterior()">

❮

</button>

<br><br>

<img
id="carousel-img"
src="imagens/foto1.jpeg"
>

<br><br>

<button onclick="fotoProxima()">

❯

</button>

</div>


<script>

/* LOADING */

window.onload=function(){

setTimeout(function(){

document.getElementById(
"loading"
).style.display="none";

},2000);

}



/* RECADOS */

function sendMessage(){

const nome=
document.getElementById(
"guestName"
).value;

const mensagem=
document.getElementById(
"guestMessage"
).value;

if(
nome===""
||
mensagem===""){

alert(
"Preencha tudo 💗"
);

return;

}

let mensagens=
JSON.parse(
localStorage.getItem(
"mensagens"
)
)
||
[];

mensagens.push({

nome:nome,

mensagem:mensagem

});

localStorage.setItem(

"mensagens",

JSON.stringify(
mensagens
)

);

document.getElementById(
"guestName"
).value="";

document.getElementById(
"guestMessage"
).value="";

mostrar();

}


function mostrar(){

let mensagens=

JSON.parse(

localStorage.getItem(
"mensagens"
)

)

||

[];

let container=

document.getElementById(
"messagesContainer"
);

container.innerHTML="";


mensagens.reverse()

.forEach(function(msg){

container.innerHTML+=`

<div class="message">

<h3>

${msg.nome}

</h3>

<p>

${msg.mensagem}

</p>

</div>

`;

});

}

mostrar();



/* CARROSSEL */

let fotos=[

".imagens/foto1.jpeg",

".imagens/foto2.jpeg",

".imagens/foto3.jpeg",

".imagens/foto4.jpeg",

".imagens/foto5.jpeg",

".imagens/foto6.jpeg",

".imagens/foto7.jpeg",

".imagens/foto8.jpeg",

".imagens/foto9.jpeg",

".imagens/foto10.jpeg",

".imagens/foto11.jpeg",

".imagens/foto12.jpeg",

".imagens/foto13.jpeg",

".imagens/foto14.jpeg",

".imagens/foto15.jpeg",

".imagens/foto16.jpeg",

".imagens/foto17.jpeg",

".imagens/foto18.jpeg"

];

let atual=0;


function fotoProxima(){

atual++;

if(
atual>=fotos.length
){

atual=0;

}

document.getElementById(
"carousel-img"
).src=fotos[atual];

}


function fotoAnterior(){

atual--;

if(
atual<0
){

atual=
fotos.length-1;

}

document.getElementById(
"carousel-img"
).src=fotos[atual];

}

</script>

</body>
</html>
